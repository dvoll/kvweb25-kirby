icon: cog
label: Einstellungen
columns:
  - width: 1
    fields:
      headlineContacts:
        label: Kontaktpersonen
        type: headline
        width: 7/12
        help: |
          Das Feld "Kontaktpersonen" ermöglicht es, relevante Kontaktpersonen zu verwalten. Diese können anschließend an anderer Stelle auf der Website ausgewählt und angezeigt werden.
      contacts:
        label: Kontaktpersonen
        type: structure
        columns:
          subject:
            width: 2/5
          photo: true
          name:
            width: 2/5
        fields:
          customUuid:
            type: hidden
          subject:
            type: text
            label: Themengebiet
          photo:
            label: Foto
            type: files
            multiple: false
          name:
            label: Name
            type: text
          email:
            label: E-Mail
            type: email
          phone:
            label: Telefon
            type: tel
      headlineTags:
        label: Schlagwörter
        type: headline
        width: 7/12
        help: |
          Schlagwörter können für die Verbindung von Inhalten genutzt werden, um ähnliche Inhalte zu gruppieren und somit die Navigation und Auffindbarkeit von Inhalten zu verbessern.
      tags:
        label: Schlagwörter
        type: structure
        width: 6/12
        fields:
          customUuid:
            type: hidden
          name:
            type: text
            label: Name
          page:
            type: pages
            label: Hauptseite
            multiple: false
            query: site.index.filterBy('template', 'in', ['layout', 'camp'])
          alternatives:
            type: entries
            label: Alternative Schreibweisen
            field:
              type: text
              required: true
      infoTags:
        label: Informationen zu Schlagwörtern und Terminen
        type: info
        theme: info
        width: 6/12
        text: |
          Die Schlagwörter auch mit Terminen verwendet werden. So können beispielsweise alle Termine mit dem Schlagwort "Zeltlager" auf den passenden Seiten angezeigt werden. Dafür muss in der Beschreibung des Google Kalender Termins das Schlagwort mit eckigen Klammern angegeben werden, z.B. `[Zeltlager]`
      headlineMainNavigation:
        label: Hauptnavigation
        type: headline
        width: 7/12
        help: |
          Hauptnavigation-Einträge können als interne Seite oder externe URL angelegt und per Drag & Drop sortiert werden. Nur veröffentlichte Seiten werden in der Navigation ausgegeben.
      mainNavigation:
        label: Hauptnavigation
        type: structure
        width: 1/1
        columns:
          label: 2/5
          link: 2/5
          newTab: 1/5
        fields:
          label:
            label: Titel
            type: text
            required: true
          link:
            label: Ziel
            type: link
            options:
              - page
              - url
            required: true
          newTab:
            label: In neuem Tab öffnen
            type: toggle
            default: false
            help: Öffnet externe Links in einem neuen Browser-Tab.
      footer:
        label: Footer
        type: headline
      footerNavigation:
        label: Footer Navigation
        width: 1/2
        type: pages
          
